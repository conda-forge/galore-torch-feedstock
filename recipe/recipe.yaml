schema_version: 1

context:
  name: galore-torch
  version: "1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/galore-torch-${{ version }}.tar.gz
  sha256: 469f793a0ae1c29cc42d9ba4550fed66983936cb50eccb46b06fbd16cfde40b9
  patches:
    - requirements.patch

build:
  number: 3
  noarch: python
  script: ls && ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - pytorch
    - transformers
    - bitsandbytes

tests:
  - python:
      imports:
        - galore_torch
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: "GaLore: Memory-Efficient LLM Training by Gradient Low-Rank Projection"
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/jiaweizzhao/GaLore

extra:
  recipe-maintainers:
    - jan-janssen
